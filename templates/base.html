<!DOCTYPE html>
<html class="light" lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
    darkMode: "class",
    theme: {
        extend: {
            colors: {
                "secondary-fixed-dim": "#d2c4b9",
                "on-tertiary-fixed": "#1f1b14",
                "on-tertiary-container": "#fff7f0",
                "tertiary": "#5f5950",
                "surface-container-high": "#e9e8e5",
                "on-surface-variant": "#504440",
                "on-primary-container": "#fff6f3",
                "on-secondary": "#ffffff",
                "surface-container": "#efeeeb",
                "on-secondary-fixed": "#211a14",
                "surface-container-lowest": "#ffffff",
                "surface-tint": "#77574b",
                "inverse-on-surface": "#f2f1ee",
                "error-container": "#ffdad6",
                "surface": "#faf9f6",
                "on-primary-fixed": "#2c160c",
                "on-primary": "#ffffff",
                "surface-bright": "#faf9f6",
                "secondary-container": "#ebddd2",
                "on-tertiary": "#ffffff",
                "on-error-container": "#93000a",
                "on-secondary-container": "#6b6158",
                "tertiary-fixed-dim": "#cec5bb",
                "on-surface": "#1a1c1a",
                "secondary-fixed": "#eee0d5",
                "tertiary-fixed": "#ebe1d6",
                "error": "#ba1a1a",
                "primary-fixed": "#ffdbce",
                "inverse-surface": "#2f312f",
                "surface-container-highest": "#e3e2e0",
                "on-error": "#ffffff",
                "on-secondary-fixed-variant": "#4e453d",
                "outline-variant": "#d4c3bd",
                "on-primary-fixed-variant": "#5d4034",
                "inverse-primary": "#e7beae",
                "primary-fixed-dim": "#e7beae",
                "primary": "#715246",
                "outline": "#82746f",
                "surface-variant": "#e3e2e0",
                "secondary": "#675d54",
                "background": "#faf9f6",
                "on-tertiary-fixed-variant": "#4c463e",
                "tertiary-container": "#787168",
                "surface-dim": "#dbdad7",
                "surface-container-low": "#f4f3f1",
                "primary-container": "#8c6a5d",
                "on-background": "#1a1c1a"
            },
            borderRadius: {
                DEFAULT: "0.25rem",
                lg: "0.5rem",
                xl: "0.75rem",
                full: "9999px"
            },
            spacing: {
                xl: "48px",
                xs: "4px",
                gutter: "20px",
                md: "16px",
                "container-max": "1200px",
                lg: "24px",
                unit: "4px",
                sm: "8px"
            },
            fontFamily: {
                "label-sm": ["Plus Jakarta Sans"],
                "body-md": ["Plus Jakarta Sans"],
                "label-md": ["Plus Jakarta Sans"],
                "headline-xl": ["Plus Jakarta Sans"],
                "headline-md": ["Plus Jakarta Sans"],
                "headline-lg": ["Plus Jakarta Sans"],
                "body-lg": ["Plus Jakarta Sans"]
            },
            fontSize: {
                "label-sm": ["12px", {"lineHeight": "1", "fontWeight": "500"}],
                "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                "label-md": ["14px", {"lineHeight": "1", "letterSpacing": "0.02em", "fontWeight": "600"}],
                "headline-xl": ["40px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                "headline-lg": ["32px", {"lineHeight": "1.25", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}]
            }
        }
    }
}
</script>
<style>
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body { background-color: #faf9f6; color: #1a1c1a; }
    .custom-shadow { box-shadow: 0 10px 30px -10px rgba(140, 106, 93, 0.08); }
    .content-shadow { box-shadow: 0 10px 30px -15px rgba(140, 106, 93, 0.08); }
</style>
</head>
<body class="bg-surface font-body-md text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed">

<!-- Header -->
<header class="bg-stone-50/80 backdrop-blur-md border-b border-stone-200/50 shadow-sm sticky top-0 z-40">
    <div class="flex justify-between items-center w-full px-6 py-3 max-w-7xl mx-auto font-['Plus_Jakarta_Sans'] antialiased">
        <a href="{{ url_for('post_list') }}" class="text-2xl font-bold tracking-tight text-stone-800">HyggeBlog</a>
        <div class="flex items-center gap-4">
            <a href="{{ url_for('post_create') }}" class="bg-primary text-on-primary px-6 py-2 rounded-full font-label-md hover:opacity-90 active:scale-[0.99] transition-all">글쓰기</a>
        </div>
    </div>
</header>

<div class="max-w-7xl mx-auto flex min-h-screen">
    <!-- Sidebar -->
    <aside class="h-[calc(100vh-64px)] w-64 hidden lg:flex flex-col sticky top-16 left-0 border-r border-stone-200/60 bg-stone-50 p-4 gap-2">
        <div class="mb-6 px-2">
            <h2 class="text-lg font-black text-stone-800">Creator Studio</h2>
            <p class="text-xs text-stone-500">Digital Hygge Space</p>
        </div>
        <nav class="flex flex-col gap-1">
            <a href="{{ url_for('post_list') }}" class="flex items-center gap-3 px-4 py-3 bg-stone-200/50 text-stone-900 font-medium rounded-lg cursor-pointer active:scale-95 transition-all">
                <span class="material-symbols-outlined">grid_view</span>
                <span class="font-label-md">게시글 목록</span>
            </a>
            <a href="{{ url_for('post_create') }}" class="flex items-center gap-3 px-4 py-3 text-stone-500 hover:text-stone-800 hover:bg-stone-100 rounded-lg cursor-pointer active:scale-95 transition-all">
                <span class="material-symbols-outlined">edit_square</span>
                <span class="font-label-md">글쓰기</span>
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-8 lg:p-12 overflow-hidden">
        {% block content %}{% endblock %}
    </main>
</div>

<!-- Footer -->
<footer class="bg-stone-100 border-t border-stone-200 w-full mt-20">
    <div class="max-w-7xl mx-auto px-6 py-12 flex flex-col md:flex-row justify-between items-center gap-4 font-['Plus_Jakarta_Sans'] text-xs tracking-wide text-stone-600">
        <p>&copy; 2024 HyggeBlog. Built for clarity and comfort.</p>
        <nav class="flex gap-8">
            <a class="opacity-70 hover:opacity-100 hover:text-stone-900 transition-opacity duration-300" href="#">About</a>
            <a class="opacity-70 hover:opacity-100 hover:text-stone-900 transition-opacity duration-300" href="#">Privacy</a>
            <a class="opacity-70 hover:opacity-100 hover:text-stone-900 transition-opacity duration-300" href="#">Contact</a>
        </nav>
    </div>
</footer>

<!-- FAB -->
<a href="{{ url_for('post_create') }}" class="fixed bottom-8 right-8 bg-primary text-on-primary w-14 h-14 rounded-full shadow-2xl flex items-center justify-center hover:scale-110 active:scale-95 transition-all z-50">
    <span class="material-symbols-outlined">add</span>
</a>

</body>
</html>
