{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl mx-auto">
    <!-- Breadcrumbs -->
    <nav class="flex items-center gap-2 text-label-sm font-label-sm text-stone-500 mb-8">
        <a class="hover:text-primary" href="{{ url_for('post_list') }}">게시글 목록</a>
        <span class="material-symbols-outlined text-[14px]">chevron_right</span>
        <span class="text-stone-800">게시글 상세</span>
    </nav>

    <!-- Actions Bar -->
    <div class="flex justify-between items-center mb-12">
        <a href="{{ url_for('post_list') }}" class="flex items-center gap-2 px-4 py-2 rounded-full border border-secondary text-secondary font-label-md hover:bg-secondary-fixed transition-all cursor-pointer">
            <span class="material-symbols-outlined">arrow_back</span>
            목록으로
        </a>
        <div class="flex items-center gap-3">
            <a href="{{ url_for('post_edit', post_id=post['id']) }}" class="flex items-center gap-2 px-5 py-2 rounded-full border border-secondary text-secondary font-label-md hover:bg-secondary-fixed transition-all cursor-pointer">
                <span class="material-symbols-outlined">edit</span>
                수정
            </a>
            <form method="POST" action="{{ url_for('post_delete', post_id=post['id']) }}" onsubmit="return confirm('정말 삭제할까요?');">
                <button type="submit" class="flex items-center gap-2 px-5 py-2 rounded-full bg-error/10 text-error font-label-md hover:bg-error/20 transition-all cursor-pointer">
                    <span class="material-symbols-outlined">delete</span>
                    삭제
                </button>
            </form>
        </div>
    </div>

    <!-- Post Content -->
    <article class="bg-surface-container-lowest rounded-2xl overflow-hidden content-shadow">
        <div class="p-10">
            <!-- Title & Meta -->
            <div class="max-w-2xl">
                <span class="bg-secondary-container text-on-secondary-container px-3 py-1 rounded-full text-label-sm font-label-sm inline-block mb-4">게시글</span>
                <h1 class="font-headline-xl text-headline-xl text-stone-900 mb-6 leading-tight">{{ post['title'] }}</h1>
                <div class="flex items-center gap-4 mb-12">
                    <div class="w-12 h-12 rounded-full bg-secondary-container flex items-center justify-center">
                        <span class="material-symbols-outlined text-on-secondary-container">person</span>
                    </div>
                    <div>
                        <p class="font-label-md text-stone-900">HyggeBlog</p>
                        <p class="text-label-sm text-stone-500">{{ post['created_at'][:16] | replace('T', ' ') }}</p>
                    </div>
                </div>
            </div>

            <!-- Post Body -->
            <div class="prose prose-stone max-w-none text-body-lg font-body-lg text-on-surface-variant leading-relaxed whitespace-pre-wrap">{{ post['content'] }}</div>

            <!-- Footer -->
            <div class="mt-12 pt-8 border-t border-stone-200">
                <div class="flex items-center justify-between bg-stone-50 p-6 rounded-xl">
                    <div class="flex items-center gap-6">
                        <span class="flex items-center gap-2 text-stone-500">
                            <span class="material-symbols-outlined">visibility</span>
                            <span class="font-label-md">상세보기</span>
                        </span>
                    </div>
                    <a href="{{ url_for('post_list') }}" class="flex items-center gap-2 text-stone-500 hover:text-stone-900 transition-colors">
                        <span class="material-symbols-outlined">list</span>
                        <span class="font-label-md">목록으로</span>
                    </a>
                </div>
            </div>
        </div>
    </article>
</div>
{% endblock %}
